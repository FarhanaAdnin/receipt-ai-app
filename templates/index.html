<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Receipt AI Extractor</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/js/all.min.js"></script>
</head>
<body>

    <div class="background-shape shape1"></div>
    <div class="background-shape shape2"></div>

    <div class="container">

        <div class="card">

            <div class="top-section">
                <div class="icon-box">
                    <i class="fa-solid fa-receipt"></i>
                </div>

                <h1>Receipt AI Extractor</h1>
                <p>Upload your receipt and let AI automatically fill the form instantly.</p>
            </div>

            <div class="upload-area">
                <input type="file" id="receipt" hidden>

                <label for="receipt" class="upload-box">
                    <i class="fa-solid fa-cloud-arrow-up"></i>
                    <span>Choose Receipt Image</span>
                </label>

                <button onclick="uploadReceipt()" class="extract-btn">
                    <i class="fa-solid fa-wand-magic-sparkles"></i>
                    Extract Data
                </button>
            </div>

            <div class="status-box">
                <p id="status">Waiting for upload...</p>
            </div>

            <div class="form-section">

                <div class="input-group">
                    <label>Merchant Name</label>
                    <input type="text" id="merchant" placeholder="Merchant Name">
                </div>

                <div class="input-group">
                    <label>Date</label>
                    <input type="text" id="date" placeholder="Receipt Date">
                </div>

                <div class="input-group">
                    <label>Total Amount</label>
                    <input type="text" id="total" placeholder="Total Amount">
                </div>

                <div class="input-group">
                    <label>Currency</label>
                    <input type="text" id="currency" placeholder="Currency">
                </div>

                <button onclick="submitForm()" class="save-btn">
                    <i class="fa-solid fa-floppy-disk"></i>
                    Save Data
                </button>

            </div>

        </div>

    </div>

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
